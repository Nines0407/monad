[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Solidity compiler
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Testing
fuzz_runs = 256
invariant_runs = 256

# Metadata
bytecode_hash = "ipfs"
cbor_metadata = true

# Extra output
extra_output = ["storageLayout", "evm.assembly", "irOptimized"]

# Verbosity
verbosity = 1

[profile.ci]
fuzz_runs = 10
invariant_runs = 10

[rpc_endpoints]
monad_testnet = "https://testnet.monad.xyz"
localhost = "http://localhost:8545"

[fmt]
line_length = 120
number_of_lines = 200