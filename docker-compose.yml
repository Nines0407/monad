version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agent-pay-postgres
    environment:
      POSTGRES_DB: agent_pay_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-pay-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agent-pay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-pay-network

  # Audit System Backend
  audit-backend:
    build:
      context: .
      dockerfile: Dockerfile.audit
    container_name: agent-pay-audit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/agent_pay_audit
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUDIT_RETENTION_DAYS=365
      - EXPORT_MAX_RECORDS=100000
      - MONAD_RPC_URL=${MONAD_RPC_URL:-https://testnet.monad.xyz}
      - MONAD_CHAIN_ID=${MONAD_CHAIN_ID:-10143}
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
    networks:
      - agent-pay-network
    restart: unless-stopped

  # Integration Layer MCP Server
  mcp-server:
    build:
      context: ./integration
      dockerfile: mcp-server/Dockerfile.mcp
    container_name: agent-pay-mcp
    depends_on:
      - audit-backend
    environment:
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_HOST=0.0.0.0
      - AUDIT_API_URL=http://audit-backend:3001
    ports:
      - "3000:3000"
    networks:
      - agent-pay-network
    restart: unless-stopped

  # WebSocket API
  websocket:
    build:
      context: ./integration
      dockerfile: websocket/Dockerfile.ws
    container_name: agent-pay-websocket
    depends_on:
      - audit-backend
      - redis
    environment:
      - WS_PORT=3002
      - REDIS_URL=redis://redis:6379
      - AUDIT_API_URL=http://audit-backend:3001
    ports:
      - "3002:3002"
    networks:
      - agent-pay-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:\monad\data\postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:\monad\data\redis

networks:
  agent-pay-network:
    driver: bridge